<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      width: 400px;
      max-width: 90%;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #333;
      text-align: center;
    }
    p {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #5568d3;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>🏢 管理后台</h1>
    <p>请使用管理员账号登录</p>
    <form id="loginForm">
      <div class="form-group">
        <label>用户ID</label>
        <input type="number" id="userId" placeholder="请输入用户ID" required>
      </div>
      <div class="form-group">
        <label>微信 OpenID（可选）</label>
        <input type="text" id="openid" placeholder="留空则使用用户ID验证">
      </div>
      <button type="submit" id="loginBtn">登录</button>
      <div class="error" id="error"></div>
    </form>
  </div>

  <script>
    const API_BASE = 'https://cloud1-d0goib6mz48e198b6.service.tcloudbase.com/wanjialin-4/api'

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()

      const userId = document.getElementById('userId').value
      const openid = document.getElementById('openid').value
      const errorEl = document.getElementById('error')
      const loginBtn = document.getElementById('loginBtn')

      errorEl.textContent = ''
      loginBtn.disabled = true
      loginBtn.textContent = '登录中...'

      try {
        // 验证用户是否是管理员
        const res = await fetch(`${API_BASE}/user/${userId}`)
        const data = await res.json()

        if (data.code === 0 && data.data.is_admin === 1) {
          // 生成临时 token（实际应该由后端生成）
          const token = btoa(`admin_${userId}_${Date.now()}`)
          localStorage.setItem('adminToken', token)
          localStorage.setItem('adminUserId', userId)

          // 跳转到管理后台
          window.location.href = '/api/dashboard/page'
        } else {
          errorEl.textContent = '您不是管理员，无权访问'
        }
      } catch (err) {
        console.error(err)
        errorEl.textContent = '登录失败，请检查网络连接'
      } finally {
        loginBtn.disabled = false
        loginBtn.textContent = '登录'
      }
    })
  </script>
</body>
</html>
