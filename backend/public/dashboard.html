<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宿舍超市数据管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .stat-card h3 { font-size: 14px; color: #666; margin-bottom: 10px; }
    .stat-card .value { font-size: 32px; font-weight: bold; color: #333; }
    .stat-card .label { font-size: 12px; color: #999; margin-top: 5px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .tab { padding: 10px 20px; border: none; background: #f5f5f5; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
    .tab.active { background: #667eea; color: white; }
    .table-container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
    .table-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { font-size: 18px; }
    .refresh-btn { padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .refresh-btn:hover { background: #5568d3; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f9f9f9; font-weight: 600; color: #333; font-size: 14px; }
    td { font-size: 14px; color: #666; }
    tr:hover { background: #f9f9f9; }
    .loading { text-align: center; padding: 40px; color: #999; }
    .pagination { padding: 20px; display: flex; justify-content: center; gap: 10px; }
    .page-btn { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; }
    .page-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .status-open { background: #d4edda; color: #155724; }
    .status-closed { background: #f8d7da; color: #721c24; }
    .status-active { background: #d1ecf1; color: #0c5460; }
  </style>
</head>
<body>
  <div class="header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <h1>🏢 宿舍超市数据管理后台</h1>
        <p>实时查看和管理系统数据</p>
      </div>
      <button onclick="logout()" style="padding: 10px 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; font-size: 14px;">退出登录</button>
    </div>
  </div>

  <div class="container">
    <div class="stats" id="stats">
      <div class="stat-card">
        <h3>总用户数</h3>
        <div class="value" id="userCount">-</div>
        <div class="label">注册用户</div>
      </div>
      <div class="stat-card">
        <h3>在售商品</h3>
        <div class="value" id="productCount">-</div>
        <div class="label">上架商品</div>
      </div>
      <div class="stat-card">
        <h3>总订单数</h3>
        <div class="value" id="orderCount">-</div>
        <div class="label">历史订单</div>
      </div>
      <div class="stat-card">
        <h3>今日订单</h3>
        <div class="value" id="todayOrders">-</div>
        <div class="label">今天新增</div>
      </div>
      <div class="stat-card">
        <h3>总交易额</h3>
        <div class="value" id="totalAmount">-</div>
        <div class="label">已完成订单</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('buildings')">楼栋管理</button>
      <button class="tab" onclick="switchTab('users')">用户列表</button>
      <button class="tab" onclick="switchTab('products')">商品列表</button>
      <button class="tab" onclick="switchTab('orders')">订单列表</button>
      <button class="tab" onclick="switchTab('agents')">代理列表</button>
    </div>

    <div class="table-container">
      <div class="table-header">
        <h2 id="tableTitle">楼栋管理</h2>
        <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
      </div>
      <div id="tableContent">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://cloud1-d0goib6mz48e198b6.service.tcloudbase.com/wanjialin-4/api'
    const TOKEN = localStorage.getItem('adminToken')
    let currentTab = 'buildings'
    let currentPage = 1

    // 检查登录状态
    if (!TOKEN) {
      window.location.href = '/api/dashboard/login'
    }

    async function fetchAPI(url) {
      const res = await fetch(API_BASE + url, {
        headers: { 'Authorization': `Bearer ${TOKEN}` }
      })
      const data = await res.json()

      // 如果返回401，跳转到登录页
      if (res.status === 401) {
        localStorage.removeItem('adminToken')
        localStorage.removeItem('adminUserId')
        window.location.href = '/api/dashboard/login'
      }

      return data
    }

    async function loadStats() {
      try {
        const res = await fetchAPI('/dashboard/stats')
        if (res.code === 0) {
          document.getElementById('userCount').textContent = res.data.userCount
          document.getElementById('productCount').textContent = res.data.productCount
          document.getElementById('orderCount').textContent = res.data.orderCount
          document.getElementById('todayOrders').textContent = res.data.todayOrders
          document.getElementById('totalAmount').textContent = '¥' + res.data.totalAmount.toFixed(2)
        }
      } catch (err) {
        console.error('加载统计数据失败:', err)
      }
    }

    async function loadData() {
      const url = `/dashboard/${currentTab}?page=${currentPage}&limit=20`
      try {
        const res = await fetchAPI(url)
        if (res.code === 0) {
          renderTable(res.data)
        }
      } catch (err) {
        console.error('加载数据失败:', err)
        document.getElementById('tableContent').innerHTML = '<div class="loading">加载失败，请检查网络连接</div>'
      }
    }

    function renderTable(data) {
      const list = Array.isArray(data) ? data : data.list
      if (!list || list.length === 0) {
        document.getElementById('tableContent').innerHTML = '<div class="loading">暂无数据</div>'
        return
      }

      const keys = Object.keys(list[0])
      let html = '<table><thead><tr>'
      keys.forEach(key => {
        html += `<th>${key}</th>`
      })
      html += '</tr></thead><tbody>'

      list.forEach(row => {
        html += '<tr>'
        keys.forEach(key => {
          let value = row[key]
          if (value === null || value === undefined) value = '-'
          if (key.includes('状态')) {
            const statusClass = value === '营业中' || value === '启用' || value === '上架' ? 'status-open' : 'status-closed'
            value = `<span class="status-badge ${statusClass}">${value}</span>`
          }
          html += `<td>${value}</td>`
        })
        html += '</tr>'
      })
      html += '</tbody></table>'

      document.getElementById('tableContent').innerHTML = html
    }

    function switchTab(tab) {
      currentTab = tab
      currentPage = 1
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      event.target.classList.add('active')

      const titles = {
        buildings: '楼栋管理',
        users: '用户列表',
        products: '商品列表',
        orders: '订单列表',
        agents: '代理列表'
      }
      document.getElementById('tableTitle').textContent = titles[tab]
      loadData()
    }

    function logout() {
      localStorage.removeItem('adminToken')
      localStorage.removeItem('adminUserId')
      window.location.href = '/api/dashboard/login'
    }

    // 初始化
    loadStats()
    loadData()
    setInterval(loadStats, 30000) // 每30秒刷新统计数据
  </script>
</body>
</html>
